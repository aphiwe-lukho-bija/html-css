<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Metadata for the browser -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Urban Cart | Product Showcase</title>

    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<!-- ===================== BODY STARTS HERE ===================== -->
<body>

    <!-- HEADER SECTION (Top of the page / branding area) -->
    <header class="hero">
        <h1>Urban Cart Collection</h1>
        <p>Fresh picks for your everyday setup.</p>
    </header>

    <!-- MAIN CONTENT AREA (All product cards are inside here) -->
    <main class="products-container">

        <!-- PRODUCT CARD 1 -->
        <article class="product-card">
            <!-- Product image -->
            <img src="https://i.ibb.co/Pstw3grR/luke-peterson-l-UMj2-Zv5-HUE-unsplash.jpg" alt="Wireless headphones">

            <!-- Product name -->
            <h2>Wireless Headphones</h2>

            <!-- Product price -->
            <p class="price">R899</p>

            <!-- Add to cart button -->
            <button>Add to Cart</button>
        </article>

        <!-- PRODUCT CARD 2 -->
        <article class="product-card">
            <img src="https://i.ibb.co/1fjkTDjm/daniel-korpai-hb-TKIbu-Mm-BI-unsplash.jpg" alt="Smart watch">
            <h2>Smart Watch</h2>
            <p class="price">R1299</p>
            <button>Add to Cart</button>
        </article>

        <!-- PRODUCT CARD 3 -->
        <article class="product-card">
            <img src="https://i.ibb.co/ZpNW4VQj/pascal-m-4-Pch-FKr-Uw84-unsplash.jpg" alt="Gaming mouse">
            <h2>Gaming Mouse</h2>
            <p class="price">R499</p>
            <button>Add to Cart</button>
        </article>

        <!-- PRODUCT CARD 4 -->
        <article class="product-card">
            <img src="https://i.ibb.co/39LR2PR5/nejc-soklic-g5-Y5kj-Ow-Gw-Q-unsplash.jpg" alt="Bluetooth speaker">
            <h2>Bluetooth Speaker</h2>
            <p class="price">R749</p>
            <button>Add to Cart</button>
        </article>

        <!-- PRODUCT CARD 5 -->
        <article class="product-card">
            <img src="https://i.ibb.co/dw4fWdH2/stefen-tan-KYw1e-Ux1-J7-Y-unsplash.jpg" alt="Mechanical keyboard">
            <h2>Mechanical Keyboard</h2>
            <p class="price">R999</p>
            <button>Add to Cart</button>
        </article>

        <!-- PRODUCT CARD 6 -->
        <article class="product-card">
            <img src="https://i.ibb.co/XHjJQB6/claudio-schwarz-W4-GR5u0-M2-JQ-unsplash.jpg" alt="Portable SSD">
            <h2>Portable SSD</h2>
            <p class="price">R1599</p>
            <button>Add to Cart</button>
        </article>

    </main>

<!-- ===================== BODY ENDS HERE ===================== -->
</body>

</html>
